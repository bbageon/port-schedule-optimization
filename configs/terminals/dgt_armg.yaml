# DGT (부산신항 7부두, 2024 개장 완전자동) ARMG 프로파일 v2 초안 — YR-022
# 공개 스펙(✅)·문헌값(📚)만 사용, 미공개(❓)·운영사 확인 필요(🤝) 항목은 기존 가정 유지.
# 근거 조사: .claude/docs/YR-002-터미널선정-결정자료.md §3·§5,
#           .claude/docs/YR-002-HJNC-DGT-요구정보.md §1~2·§5 (항목별 상태 표기 원본)
# 케이스 특이: 블록당 2기 육/해측 분리 (육측=외부트럭 원격조종, 해측=AGV). 본 초안은 단일 YC
# 모델이라 육측 외부트럭 인계만 반영 — 해측 AGV 연동·인계시간 확률화(PEMA 분산 명시)는 후속 🤝.
# 주의: 문헌 보정본이며 실측 아님 → assumed: true 유지. 협약 데이터 확보 전 실운영 주장 불가.
# 실제 육측 LSTP·해측 WSTP·AGV 동선은 dgt_public_topology.yaml 이 원본이다.
# 아래 transfer_row=0은 레거시 단일 YC 좌표이며 실제 DGT 레인 토폴로지가 아니다.
terminal_id: DGT-ARMG
profile_date: 2026-07-13
assumed: true

block:
  block_id: B1
  bay_count: 24        # ❓ 전 터미널 미공개 — 기존 가정 유지 (문헌 일반치 10~40 bay 범위 내)
  row_count: 10        # ✅ 공식 장비 페이지 — 최대 10열
  tier_max: 6          # ✅ 공식 장비 페이지 — 6단
  bay_length_m: 6.5    # 📚 20ft slot + 갭 일반치 (기존 유지)
  row_width_m: 3.1     # ❓ DGT 레일간격 미공개 — 동급 신항 HJNC 유도값(31m÷10열) 준용
  tier_height_m: 2.6   # 📚 컨테이너 표준 높이 + 여유 (기존 유지)

crane:
  crane_id: YC-01
  # ✅ 역할 고정: 육측=외부트럭/해측=AGV (공식 서술). 단일 YC 초안은 육측 1기 관점 — bay 분담 🤝
  service_bay_min: 1
  service_bay_max: 24
  gantry_speed_mps: 4.0          # 📚 Kalmar ASC 240~300 m/min (4~5 m/s) — 하한 채택 (기존 2.0 의 2배)
  trolley_speed_mps: 1.0         # 📚 Kalmar 60/72 m/min·TBA 1.0 — 기존 유지
  hoist_speed_loaded_mps: 0.58   # 📚 Kalmar ASC 만재 35 m/min
  hoist_speed_empty_mps: 1.17    # 📚 Kalmar ASC 공차 70 m/min
  lock_time_s: 30                # 📚+🤝 육측 원격조종 인계는 분산 큼(PEMA) — 확률화 전까지 평균 가정 유지
  unlock_time_s: 20              # 📚+🤝 〃
  truck_positioning_time_s: 25   # 📚+🤝 〃

handover:
  transfer_row: 0   # ✅ 캔틸레버 — 육측(외부트럭) 차선 인계. 해측 AGV 인계는 본 초안 범위 밖

operations:
  long_wait_sla_s: 1800          # 📚 안전운임제 대기료 임계 60분 → warning 단계 30분 채택 (2단계화는 후속)
  vessel_deadline_slack_warn_s: 900   # 가정 유지 (🤝 vessel_priority_rule 미확보)
  decision_horizon_s: 1800       # 🤝 TOS 계획창 미확인 — 가정 유지
  gate_travel_estimate_s: 210    # 📚 게이트→블록 순주행 2~5분 문헌 → 중앙값 3.5분 (기존 600s 하향)
