# ── 자료충족도 (Level, spec §9). 전 터미널 Level 0~1. Level 2 적격 = 0개.
data_sufficiency:
  note: >-
    Level2 자격 = 블록좌표·Bay/Row/Tier·진입출구·작업면 + 실제 크레인배치·담당Bay·통과규칙·안전거리 +
    방향·길이·용량·허용차종 레인/인계점. 현재 전 터미널 미충족(0개). HJNC 가 구조 확인 최다이나
    블록좌표·Bay·레인그래프·통과규칙 부재로 Level2 아님.
  level_rule: >-
    Level0=규모비교(장비수·CY·게이트). Level1=개념 격자 시뮬레이션 — 조사문서 §9 정의상
    "블록 수가 공개된 터미널"이 전제이므로 block_count 가 confirmed 또는 derived 여야 한다.
    block_count=unresolved 면 격자조차 못 만들어 Level0 이다(감사 low findings 반영, 내부 일관성).
    Level2 는 블록좌표·Bay·레인그래프·통과규칙 확인 후 — 전 터미널 미충족.
  levels:
    PNIT: 0     # block_count unresolved → 규모비교만
    PNC: 1      # block_count 40 confirmed
    HJNC: 1     # block_count 21 confirmed (구조 확인 최다이나 좌표·Bay·레인그래프 부재로 Level2 미달)
    HPNT: 0     # block_count unresolved
    DGT: 1      # block_count 23 derived(46÷2) — 규칙상 derived 허용, 단 확정 아님
    BNCT: 0     # block_count unresolved
    BCT: 0      # block_count unresolved
    BPT_SINSEONDAE: 0
    BPT_GAMMAN: 0
    HKT: 0

# ── YR-042(다른 터미널 무재학습 게이트) 입력 자격 판정.
yr042_eligibility:
  rule: 같은 구조군 Level2 적격 2크레인 블록 프로파일 2개 이상이면 cross-terminal structure arm 개방
  verdict: "DATA-BLOCKED — NO ELIGIBLE PROFILE"
  detail: >-
    전 구조군 Level2 적격 0개. 수평형 PROVISIONAL 군은 assumed profile stress arm 만 허용
    (성능주장 금지, profile-shift stress 로만 표기). 수직·혼합군은 YR-083 런타임 미지원까지 실행 금지.
