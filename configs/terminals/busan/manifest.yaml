# 부산항 10개 컨테이너터미널 공개자료 레지스트리 (YR-082-A) — 기계가독 manifest
# 원본(single source, 사용자 소유 로컬): 부산항_터미널별_강화학습_환경정보_상세조사.md (938줄, 2026-07-20)
# 목적: 공개자료를 "바로 실행값"으로 오해하지 않도록 필드별 증거등급을 박제한다.
#
# 증거등급(status) 어휘 — 승격 금지 계약:
#   confirmed  : BPA 또는 운영사 공식 페이지에서 직접 확인
#   derived    : 확인값에서 유도(참고용). confirmed 로 올리지 않는다 (예: 46÷2=23블록)
#   assumed    : 문헌 보정 가정값 (실측 아님). 구조군 physics_base 가 제공
#   unresolved : 공개자료로 확인 안 됨 / 충돌. 0·평균으로 채우지 않는다
# 충돌값(BPA≠운영사)은 한 값으로 합치지 않고 both 로 보존한다.
#
# 금지(spec §프로파일 증거 계약): 부두·안벽·철도·전체야드 길이를 차량 레인 길이로 대체 /
#   CY 면적에서 블록길이·Bay 역산 / 전체 크레인수÷블록수를 블록당 대수로 확정 /
#   연간 처리능력·전체 장비수를 블록별 도착률·장치율로 환산.

schema: busan-terminal-registry-v1
source_doc: 부산항_터미널별_강화학습_환경정보_상세조사.md
source_date: 2026-07-20
source_authority_default: BPA(부산항만공사) 신항/북항 시설현황 총괄 + 각 운영사 공식 페이지
claim_gate: >-
  전 터미널 Level 0~1. 실운영 개선율·CURRENT_RULE 재현·운영사 실측 validation 주장 금지.
  가능한 주장 = 문헌·공개자료 보정 시뮬레이션의 방법론 결과. Level 2 는 블록좌표·Bay·레인그래프·
  크레인 통과규칙 확인 후, Level 3 는 TOS/VBS/RTLS 실측 후, Level 4(현장) 는 별도 승인 후.

# ── 구조군 (spec §구조군): 다르면 동결 가중치 재사용·성능 평균합산 금지.
#    수직/혼합형을 현 2크레인 공동경합 엔진에 이름만 바꿔 넣는 시험은 금지(runnable_in_current_engine=false).
archetypes:
  PROVISIONAL_RMG_ATC_YT:
    desc: RMG/ATC·YT 계열 잠정군 — 크레인 2기 같은 블록·둘 다 트럭+본선(수평 가정)
    members: [PNIT, PNC, HJNC, HPNT]
    physics_base: configs/terminals/hjnc_armg.yaml   # 문헌 보정 assumed physics (현 SNP-ARMG-STD 와 동일 계열)
    role_separated: false
    runnable_in_current_engine: true    # 단 Level 1 stress 전용 — 성능주장 금지. HJNC 만 수평 확인, 나머지 방향 unresolved
  VERTICAL_ARMG_AGV:
    desc: 수직형 ARMG·AGV — 블록당 2기 육측(외부트럭)/해측(AGV) 역할분리
    members: [DGT]
    physics_base: configs/terminals/dgt_armg.yaml
    role_separated: true                # 엔진 실제 소비는 YR-083 (도로·인계점·역할 런타임화)
    runnable_in_current_engine: false   # 역할분리·AGV 흐름 미구현 — 이름만 바꿔 실행 금지(spec)
  VERTICAL_TC_SC:
    desc: 수직형 자동화·Straddle Carrier — S/C 이동·인계 규칙이 AGV·YT 와 다름
    members: [BNCT, BCT]
    physics_base: null                  # S/C 역학 미구현 — physics_base 없음
    role_separated: null                # 육해측 분리 가능성 있으나 공개 확정 불가
    runnable_in_current_engine: false
  CONVENTIONAL_MIXED_PROVISIONAL:
    desc: 북항 기존형·혼합 — 장비형식·블록이동·최신 운영구조부터 현장 확인 필요
    members: [BPT_SINSEONDAE, BPT_GAMMAN, HKT]
    physics_base: null
    role_separated: null
    runnable_in_current_engine: false

